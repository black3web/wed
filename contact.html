<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا - نيون</title>
    <link rel="stylesheet" href="fontawesome-free-6.4.0-web/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --neon-red: #ff073a;
            --neon-gold: #ffd700;
            --dark-bg: #0a0a0a;
            --glass-bg: rgba(10, 10, 10, 0.3);
            --text-light: #e0e0e0;
            --shadow-neon: 0 0 20px rgba(255, 7, 58, 0.5), 0 0 40px rgba(255, 215, 0, 0.3);
            --border-neon: 1px solid rgba(255, 7, 58, 0.6);
        }

        body {
            min-height: 100vh;
            background: var(--dark-bg);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        /* الخلفية المتحركة بالأشكال الهندسية */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            filter: blur(1px) drop-shadow(0 0 10px var(--neon-red));
            opacity: 0.6;
            animation: float 20s infinite ease-in-out;
        }

        .shape-1 {
            width: 150px;
            height: 150px;
            background: transparent;
            border: 3px solid var(--neon-red);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            top: 10%;
            left: 5%;
            box-shadow: 0 0 30px var(--neon-red), inset 0 0 20px var(--neon-red);
            animation: morph 15s infinite alternate, spin 30s linear infinite;
        }

        .shape-2 {
            width: 200px;
            height: 200px;
            background: transparent;
            border: 2px solid var(--neon-gold);
            border-radius: 50%;
            bottom: 15%;
            right: 10%;
            box-shadow: 0 0 40px var(--neon-gold), inset 0 0 30px var(--neon-gold);
            animation: pulseGlow 4s infinite alternate, rotate3d 20s infinite linear;
        }

        .shape-3 {
            width: 0;
            height: 0;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-bottom: 180px solid rgba(255, 7, 58, 0.4);
            top: 60%;
            left: 20%;
            filter: drop-shadow(0 0 20px var(--neon-red));
            animation: moveTriangle 18s infinite alternate;
        }

        .shape-4 {
            width: 300px;
            height: 300px;
            background: repeating-linear-gradient(45deg, var(--neon-red) 0px, var(--neon-red) 5px, transparent 5px, transparent 20px);
            border-radius: 20px;
            top: 40%;
            right: -50px;
            opacity: 0.3;
            transform: rotate(45deg);
            animation: rotateGradient 25s linear infinite;
        }

        .shape-5 {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, var(--neon-gold) 0%, transparent 70%);
            border-radius: 50%;
            top: 80%;
            left: 50%;
            filter: blur(5px);
            animation: moveStar 12s infinite alternate;
        }

        /* النجوم المتحركة */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-gold), 0 0 20px var(--neon-red);
            animation: twinkle 3s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-20px) rotate(5deg); }
        }

        @keyframes morph {
            0% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
            100% { border-radius: 70% 30% 30% 70% / 70% 70% 30% 30%; }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 20px var(--neon-gold), inset 0 0 10px var(--neon-gold); }
            100% { box-shadow: 0 0 60px var(--neon-red), inset 0 0 30px var(--neon-red); }
        }

        @keyframes rotate3d {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            100% { transform: rotateX(360deg) rotateY(180deg); }
        }

        @keyframes moveTriangle {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(50px, -50px) rotate(20deg); }
        }

        @keyframes rotateGradient {
            from { transform: rotate(45deg); }
            to { transform: rotate(405deg); }
        }

        @keyframes moveStar {
            0% { transform: translateX(0) scale(1); }
            100% { transform: translateX(100px) scale(1.5); }
        }

        /* الهيدر */
        .header {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: var(--border-neon);
            box-shadow: var(--shadow-neon);
        }

        .back-btn {
            font-size: 22px;
            color: var(--neon-gold);
            cursor: pointer;
            text-shadow: 0 0 15px var(--neon-red);
            transition: transform 0.2s;
        }

        .back-btn:active {
            transform: scale(0.9);
        }

        .page-title {
            font-size: 18px;
            color: var(--neon-gold);
            font-weight: 700;
            text-shadow: 0 0 15px var(--neon-red);
        }

        .header-placeholder {
            width: 22px;
        }

        /* الحاوية الرئيسية */
        .container {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .contact-card {
            width: 100%;
            max-width: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            border: var(--border-neon);
            box-shadow: var(--shadow-neon), 0 0 0 2px rgba(255, 215, 0, 0.2) inset;
            padding: 30px 25px;
            transition: all 0.3s ease;
        }

        .contact-card:hover {
            box-shadow: 0 0 40px var(--neon-red), 0 0 80px var(--neon-gold), 0 0 0 3px rgba(255, 7, 58, 0.6) inset;
        }

        .intro-icon {
            text-align: center;
            margin-bottom: 20px;
        }

        .intro-icon i {
            font-size: 50px;
            color: var(--neon-gold);
            text-shadow: 0 0 20px var(--neon-red), 0 0 40px var(--neon-gold);
        }

        .contact-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 30px 0;
        }

        .contact-item {
            display: flex;
            align-items: center;
            text-decoration: none;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            padding: 12px 20px;
            border: 1px solid rgba(255, 7, 58, 0.4);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
        }

        .contact-item:active {
            transform: scale(0.97);
            box-shadow: 0 0 30px var(--neon-red), 0 0 0 2px rgba(255, 215, 0, 0.6) inset;
        }

        .icon-box {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255, 7, 58, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 15px;
            border: 1px solid var(--neon-gold);
            box-shadow: 0 0 15px var(--neon-red);
        }

        .icon-box i {
            font-size: 22px;
            color: var(--neon-gold);
            text-shadow: 0 0 10px var(--neon-red);
        }

        .content {
            flex: 1;
        }

        .content h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--neon-gold);
            margin-bottom: 3px;
            text-shadow: 0 0 8px var(--neon-red);
        }

        .content p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            direction: ltr;
            text-align: left;
        }

        .arrow {
            color: var(--neon-red);
            font-size: 14px;
            margin-right: 10px;
            opacity: 0.8;
        }

        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--neon-gold);
            font-size: 16px;
            margin-top: 20px;
            text-shadow: 0 0 15px var(--neon-red);
        }

        .loading i {
            font-size: 22px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .footer-note {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            text-shadow: 0 0 10px var(--neon-red);
        }

        /* تكيف مع الجوال */
        @media (max-width: 480px) {
            .contact-card {
                padding: 25px 15px;
                border-radius: 30px;
            }
            .shape-3 {
                border-left-width: 60px;
                border-right-width: 60px;
                border-bottom-width: 100px;
            }
            .content p {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
        <div class="shape shape-5"></div>
        <div class="stars" id="starsContainer"></div>
    </div>

    <div class="header">
        <i class="fas fa-arrow-right back-btn" onclick="history.back()"></i>
        <h2 class="page-title">تواصل معنا</h2>
        <div class="header-placeholder"></div>
    </div>

    <div class="container">
        <div class="contact-card">
            <div class="intro-icon">
                <i class="fas fa-headset"></i>
            </div>

            <div class="contact-list">
                <!-- حساب تليجرام -->
                <div class="contact-item" data-url="https://t.me/szc_v">
                    <div class="icon-box">
                        <i class="fab fa-telegram-plane"></i>
                    </div>
                    <div class="content">
                        <h3>حساب تليجرام</h3>
                        <p>@szc_v</p>
                    </div>
                    <i class="fas fa-chevron-left arrow"></i>
                </div>

                <!-- قناة تليجرام -->
                <div class="contact-item" data-url="https://t.me/swc_t">
                    <div class="icon-box">
                        <i class="fab fa-telegram"></i>
                    </div>
                    <div class="content">
                        <h3>قناة تليجرام</h3>
                        <p>t.me/swc_t</p>
                    </div>
                    <i class="fas fa-chevron-left arrow"></i>
                </div>

                <!-- موقع المبرمج -->
                <div class="contact-item" data-url="https://black3web.github.io/Blackweb/">
                    <div class="icon-box">
                        <i class="fas fa-code"></i>
                    </div>
                    <div class="content">
                        <h3>موقع المبرمج</h3>
                        <p>black3web.github.io/Blackweb</p>
                    </div>
                    <i class="fas fa-chevron-left arrow"></i>
                </div>
            </div>

            <div class="loading" id="loading">
                <i class="fas fa-circle-notch"></i> جارٍ التحميل...
            </div>

            <p class="footer-note">نسألكم الدعاء</p>
        </div>
    </div>

    <script>
        // إنشاء النجوم ديناميكياً
        function createStars() {
            const starsContainer = document.getElementById('starsContainer');
            const numberOfStars = 100;
            for (let i = 0; i < numberOfStars; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                const size = Math.random() * 4 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 5 + 's';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();

        const contactItems = document.querySelectorAll('.contact-item');
        const loading = document.getElementById('loading');
        let isNavigating = false;

        contactItems.forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault(); // منع الانتقال المباشر
                if (isNavigating) return;

                const url = this.dataset.url;
                if (!url) return;

                isNavigating = true;

                // تأثير الضغط
                this.style.transform = 'scale(0.95)';
                this.style.boxShadow = '0 0 40px var(--neon-red), 0 0 0 3px rgba(255, 215, 0, 0.8) inset';

                // إظهار رسالة التحميل
                loading.style.display = 'flex';

                // بعد 3 ثوانٍ انتقل إلى الرابط
                setTimeout(() => {
                    window.location.href = url;
                }, 3000);
            });
        });
    </script>
</body>
</html>
