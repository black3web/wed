<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق التلاوات النيوني</title>
    <link rel="stylesheet" href="fontawesome-free-6.4.0-web/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --neon-red: #ff073a;
            --neon-gold: #ffd700;
            --dark-bg: #0a0a0a;
            --glass-bg: rgba(10, 10, 10, 0.3);
            --text-light: #e0e0e0;
            --shadow-neon: 0 0 20px rgba(255, 7, 58, 0.5), 0 0 40px rgba(255, 215, 0, 0.3);
            --border-neon: 1px solid rgba(255, 7, 58, 0.6);
        }

        body {
            min-height: 100vh;
            background: var(--dark-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* الخلفية المتحركة بالأشكال الهندسية */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            filter: blur(1px) drop-shadow(0 0 10px var(--neon-red));
            opacity: 0.6;
            animation: float 20s infinite ease-in-out;
        }

        .shape-1 {
            width: 150px;
            height: 150px;
            background: transparent;
            border: 3px solid var(--neon-red);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            top: 10%;
            left: 5%;
            box-shadow: 0 0 30px var(--neon-red), inset 0 0 20px var(--neon-red);
            animation: morph 15s infinite alternate, spin 30s linear infinite;
        }

        .shape-2 {
            width: 200px;
            height: 200px;
            background: transparent;
            border: 2px solid var(--neon-gold);
            border-radius: 50%;
            bottom: 15%;
            right: 10%;
            box-shadow: 0 0 40px var(--neon-gold), inset 0 0 30px var(--neon-gold);
            animation: pulseGlow 4s infinite alternate, rotate3d 20s infinite linear;
        }

        .shape-3 {
            width: 0;
            height: 0;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-bottom: 180px solid rgba(255, 7, 58, 0.4);
            top: 60%;
            left: 20%;
            filter: drop-shadow(0 0 20px var(--neon-red));
            animation: moveTriangle 18s infinite alternate;
        }

        .shape-4 {
            width: 300px;
            height: 300px;
            background: repeating-linear-gradient(45deg, var(--neon-red) 0px, var(--neon-red) 5px, transparent 5px, transparent 20px);
            border-radius: 20px;
            top: 40%;
            right: -50px;
            opacity: 0.3;
            transform: rotate(45deg);
            animation: rotateGradient 25s linear infinite;
        }

        .shape-5 {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, var(--neon-gold) 0%, transparent 70%);
            border-radius: 50%;
            top: 80%;
            left: 50%;
            filter: blur(5px);
            animation: moveStar 12s infinite alternate;
        }

        /* النجوم المتحركة */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-gold), 0 0 20px var(--neon-red);
            animation: twinkle 3s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-20px) rotate(5deg); }
        }

        @keyframes morph {
            0% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
            100% { border-radius: 70% 30% 30% 70% / 70% 70% 30% 30%; }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 20px var(--neon-gold), inset 0 0 10px var(--neon-gold); }
            100% { box-shadow: 0 0 60px var(--neon-red), inset 0 0 30px var(--neon-red); }
        }

        @keyframes rotate3d {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            100% { transform: rotateX(360deg) rotateY(180deg); }
        }

        @keyframes moveTriangle {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(50px, -50px) rotate(20deg); }
        }

        @keyframes rotateGradient {
            from { transform: rotate(45deg); }
            to { transform: rotate(405deg); }
        }

        @keyframes moveStar {
            0% { transform: translateX(0) scale(1); }
            100% { transform: translateX(100px) scale(1.5); }
        }

        /* الحاوية الرئيسية بتأثير الزجاج */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 40px 25px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            border: var(--border-neon);
            box-shadow: var(--shadow-neon), 0 0 0 2px rgba(255, 215, 0, 0.2) inset;
            transition: all 0.3s ease;
        }

        .container:hover {
            box-shadow: 0 0 40px var(--neon-red), 0 0 80px var(--neon-gold), 0 0 0 3px rgba(255, 7, 58, 0.6) inset;
        }

        .app-icon {
            width: clamp(120px, 30vw, 160px);
            height: clamp(120px, 30vw, 160px);
            background: rgba(0, 0, 0, 0.5);
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px;
            cursor: pointer;
            border: 2px solid var(--neon-gold);
            box-shadow: 0 0 30px var(--neon-red), 0 0 0 2px rgba(255, 215, 0, 0.5) inset;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            backdrop-filter: blur(5px);
        }

        .app-icon i {
            font-size: clamp(50px, 15vw, 80px);
            color: var(--neon-gold);
            text-shadow: 0 0 20px var(--neon-red), 0 0 40px var(--neon-gold);
            transition: inherit;
        }

        .app-icon:active {
            transform: scale(0.85);
            box-shadow: 0 0 60px var(--neon-red), 0 0 0 4px rgba(255, 215, 0, 0.8) inset;
        }

        .app-icon.loading {
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 30px var(--neon-red); }
            50% { transform: scale(1.05); box-shadow: 0 0 70px var(--neon-gold); }
            100% { transform: scale(1); box-shadow: 0 0 30px var(--neon-red); }
        }

        .title {
            color: var(--text-light);
            font-size: clamp(28px, 8vw, 40px);
            margin-bottom: 10px;
            font-weight: 700;
            text-shadow: 0 0 15px var(--neon-red);
        }

        .title span {
            color: var(--neon-gold);
            text-shadow: 0 0 20px var(--neon-gold);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: clamp(14px, 4vw, 18px);
            line-height: 1.7;
            margin-bottom: 30px;
            max-width: 320px;
            margin-left: auto;
            margin-right: auto;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 20px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 7, 58, 0.3);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }

        .loading {
            display: none;
            color: var(--neon-gold);
            font-size: 18px;
            margin: 20px 0 10px;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-shadow: 0 0 15px var(--neon-red);
        }

        .loading i {
            font-size: 24px;
            animation: spin 1s linear infinite;
        }

        .tap-instruction {
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(13px, 3.5vw, 16px);
            margin-top: 25px;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            backdrop-filter: blur(4px);
            border: 1px solid var(--neon-gold);
            box-shadow: 0 0 15px var(--neon-red);
        }

        .tap-instruction i {
            color: var(--neon-red);
            margin-left: 8px;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* تكيف مع الجوال */
        @media (max-width: 480px) {
            .container {
                padding: 30px 15px;
                border-radius: 30px;
            }
            .subtitle {
                padding: 12px 15px;
            }
            .shape-3 {
                border-left-width: 60px;
                border-right-width: 60px;
                border-bottom-width: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
        <div class="shape shape-5"></div>
        <div class="stars" id="starsContainer"></div>
    </div>

    <div class="container">
        <div class="app-icon" id="appIcon">
            <i class="fas fa-mosque"></i>
        </div>
        
        <h1 class="title">تلاوات <span>نيون</span></h1>
        <p class="subtitle">يحتوي التطبيق على مجموعة مميزة من التلاوات المختارة بعناية لتوفير تجربة استماع مريحة ومفيدة.</p>
        
        <div class="loading" id="loading">
            <i class="fas fa-circle-notch"></i> جارٍ التحميل...
        </div>
        
        <div class="tap-instruction">
            انقر على الأيقونة لفتح التطبيق <i class="fas fa-hand-point-up"></i>
        </div>
    </div>

    <script>
        // إنشاء النجوم ديناميكياً
        function createStars() {
            const starsContainer = document.getElementById('starsContainer');
            const numberOfStars = 100;
            for (let i = 0; i < numberOfStars; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                const size = Math.random() * 4 + 1; // حجم بين 1 و 5 بكسل
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 5 + 's';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();

        const appIcon = document.getElementById('appIcon');
        const loading = document.getElementById('loading');
        let clickable = true;

        appIcon.addEventListener('click', function() {
            if (!clickable) return; // منع الضغط المتكرر
            clickable = false;

            // إضافة تأثير الضغط
            this.classList.add('loading');
            
            // إظهار رسالة التحميل
            loading.style.display = 'flex';
            
            // تغيير لون الأيقونة مؤقتاً
            this.style.boxShadow = '0 0 80px var(--neon-gold), 0 0 0 4px rgba(255, 7, 58, 0.8) inset';
            
            // محاكاة تحميل لمدة 3 ثوانٍ ثم الانتقال
            setTimeout(function() {
                window.location.href = 'indexr.html';
            }, 3000);
        });
    </script>
</body>
</html>
