<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#050000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ILYA AI Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="bg-canvas"></canvas>

<button id="lang-btn" class="lang-btn">
  <i class="fa-solid fa-globe"></i>
  <span id="lang-label">EN</span>
</button>

<div id="toast-container"></div>

<div id="lightbox">
  <button class="lb-close" id="lb-close"><i class="fa-solid fa-xmark"></i></button>
  <img src="" alt="" id="lb-img">
</div>

<!-- ══ PRELOADER ════════════════════════════════════════════════ -->
<div id="preloader">
  <div class="pre-bg"></div>
  <div class="pre-particles" id="pre-particles"></div>

  <div class="pre-frame">
    <svg class="pre-hex-svg" viewBox="0 0 200 200" fill="none">
      <polygon points="100,8 190,55 190,145 100,192 10,145 10,55" stroke="rgba(220,20,60,0.4)" stroke-width="1" fill="none"/>
      <polygon points="100,20 178,63 178,137 100,180 22,137 22,63" stroke="rgba(220,20,60,0.2)" stroke-width="0.5" fill="none"/>
    </svg>
    <div class="pre-ring pre-r1"></div>
    <div class="pre-ring pre-r2"></div>
    <div class="pre-ring pre-r3"></div>
    <img src="https://iili.io/B04MxcX.md.jpg" class="pre-logo" alt="ILYA"
         onerror="this.style.background='linear-gradient(135deg,#3d0000,#8B0000)'">
    <div class="pre-scan"></div>
    <div class="pre-corner pre-c-tl"></div>
    <div class="pre-corner pre-c-tr"></div>
    <div class="pre-corner pre-c-bl"></div>
    <div class="pre-corner pre-c-br"></div>
  </div>

  <h1 class="pre-title">ILYA</h1>
  <p class="pre-sub">AI · PLATFORM · v2</p>

  <div class="pre-progress-wrap">
    <div class="pre-track">
      <div class="pre-fill" id="pre-fill"></div>
      <div class="pre-bolt-icon" id="pre-bolt"><i class="fa-solid fa-bolt"></i></div>
    </div>
    <span class="pre-pct" id="pre-pct">0%</span>
  </div>
  <p class="pre-loading-txt" id="pre-txt">تهيئة المنصة...</p>
</div>

<!-- ══ APP ══════════════════════════════════════════════════════ -->
<div id="app">

  <div id="sidebar-overlay">
    <aside id="sidebar"></aside>
  </div>

  <nav id="main-nav" class="hidden">
    <button class="nav-btn active" id="nav-home">
      <i class="fa-solid fa-house"></i>
      <span data-ar="الرئيسية" data-en="Home">الرئيسية</span>
    </button>
    <button class="nav-btn" id="nav-ai">
      <i class="fa-solid fa-wand-magic-sparkles"></i>
      <span data-ar="خدمات AI" data-en="AI Tools">خدمات AI</span>
    </button>
    <button class="nav-btn" id="nav-profile">
      <i class="fa-solid fa-user"></i>
      <span data-ar="حسابي" data-en="Account">حسابي</span>
    </button>
    <button class="nav-btn" id="nav-menu">
      <i class="fa-solid fa-bars"></i>
      <span data-ar="القائمة" data-en="Menu">القائمة</span>
      <span class="nav-dot" id="nav-dot"></span>
    </button>
  </nav>

  <div id="page-auth"      class="page"></div>
  <div id="page-dashboard" class="page"></div>
  <div id="page-ai"        class="page"></div>
  <div id="page-model"     class="page"></div>
  <div id="page-profile"   class="page"></div>
  <div id="page-help"      class="page"></div>
  <div id="page-support"   class="page"></div>
  <div id="page-admin"     class="page"></div>

</div>

<script src="background.js"></script>
<script src="app.js"></script>
<script src="auth.js"></script>
<script src="dashboard.js"></script>
<script src="ai.js"></script>
<script src="admin.js"></script>
</body>
</html>
