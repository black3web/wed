<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#050000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="ILYA AI — منصة خدمات الذكاء الاصطناعي المتكاملة">
  <title>ILYA AI Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Canvas Background -->
<canvas id="bg-canvas"></canvas>

<!-- ── PRELOADER ──────────────────────────────────────── -->
<div id="preloader">
  <div class="pre-glow"></div>
  <div class="pre-particles" id="pre-particles"></div>

  <div class="pre-frame">
    <svg class="pre-hex" viewBox="0 0 200 200" fill="none">
      <polygon points="100,6 190,53 190,147 100,194 10,147 10,53" stroke="rgba(220,20,60,0.5)" stroke-width="1.2"/>
      <polygon points="100,22 176,66 176,134 100,178 24,134 24,66" stroke="rgba(220,20,60,0.22)" stroke-width="0.6"/>
    </svg>
    <div class="pre-ring r1"></div>
    <div class="pre-ring r2"></div>
    <div class="pre-ring r3"></div>
    <img src="https://iili.io/B04MxcX.md.jpg" class="pre-logo" id="pre-logo" alt="ILYA"
         onerror="this.style.cssText='background:linear-gradient(135deg,#3d0000,#8B0000);border-radius:50%'">
    <div class="pre-scan"></div>
    <span class="pre-c pre-c-tl"></span>
    <span class="pre-c pre-c-tr"></span>
    <span class="pre-c pre-c-bl"></span>
    <span class="pre-c pre-c-br"></span>
  </div>

  <h1 class="pre-title">ILYA</h1>
  <p class="pre-sub">AI · PLATFORM · v3</p>

  <div class="pre-bar-wrap">
    <div class="pre-track">
      <div class="pre-fill" id="pre-fill"></div>
      <div class="pre-bolt" id="pre-bolt"><i class="fa-solid fa-bolt"></i></div>
    </div>
    <div class="pre-info">
      <span id="pre-status">تهيئة المنصة...</span>
      <span class="pre-pct" id="pre-pct">0%</span>
    </div>
  </div>
</div>

<!-- ── APP ───────────────────────────────────────────── -->
<div id="app">

  <!-- Toasts -->
  <div id="toast-container"></div>

  <!-- Lightbox -->
  <div id="lightbox">
    <div class="lb-bg" id="lb-bg"></div>
    <div class="lb-wrap">
      <button class="lb-close" id="lb-close"><i class="fa-solid fa-xmark"></i></button>
      <img src="" alt="Preview" id="lb-img">
    </div>
  </div>

  <!-- Sidebar Overlay -->
  <div id="sidebar-overlay"><aside id="sidebar"></aside></div>

  <!-- Top Bar -->
  <header id="top-bar" class="hidden">
    <button class="tb-menu" id="tb-menu" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="tb-logo" id="tb-logo">
      <span class="tb-orb"></span>
      <span class="tb-name">ILYA <em>AI</em></span>
    </div>
    <div class="tb-right">
      <button class="tb-lang" id="lang-btn">
        <i class="fa-solid fa-globe"></i>
        <span id="lang-label">EN</span>
      </button>
      <button class="tb-avatar" id="tb-avatar">
        <img src="https://iili.io/B04MxcX.md.jpg" id="tb-av-img" alt="Me">
      </button>
    </div>
  </header>

  <!-- Pages -->
  <div id="page-auth"      class="page"></div>
  <div id="page-dashboard" class="page"></div>
  <div id="page-ai"        class="page"></div>
  <div id="page-model"     class="page"></div>
  <div id="page-profile"   class="page"></div>
  <div id="page-help"      class="page"></div>
  <div id="page-support"   class="page"></div>
  <div id="page-gallery"   class="page"></div>
  <div id="page-admin"     class="page"></div>

</div><!-- /#app -->

<script src="background.js"></script>
<script src="app.js"></script>
<script src="auth.js"></script>
<script src="dashboard.js"></script>
<script src="ai.js"></script>
<script src="admin.js"></script>
</body>
</html>
