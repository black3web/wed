<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#050000">
  <meta name="description" content="ILYA AI — منصة خدمات الذكاء الاصطناعي المتقدمة">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ILYA AI Platform</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══ Animated Background Canvas ════════════════════════════ -->
<canvas id="bg-canvas"></canvas>

<!-- ══ Language Button ═══════════════════════════════════════ -->
<button id="lang-btn" class="lang-btn">🌐 EN</button>

<!-- ══ Toast Container ═══════════════════════════════════════ -->
<div id="toast-container"></div>

<!-- ══ Lightbox ══════════════════════════════════════════════ -->
<div id="lightbox"><img src="" alt="Preview"></div>

<!-- ══ Preloader ════════════════════════════════════════════ -->
<div id="preloader">
  <div class="pre-bg-glow"></div>

  <!-- Scan line overlay -->
  <div class="pre-scan"></div>

  <!-- Logo Frame -->
  <div class="pre-frame">
    <div class="pre-ring pre-ring-1"></div>
    <div class="pre-ring pre-ring-2"></div>
    <div class="pre-ring pre-ring-3"></div>
    <img src="https://iili.io/B04MxcX.md.jpg" alt="ILYA" class="pre-logo"
         onerror="this.style.background='var(--red-deep)'">
    <div class="pre-corners">
      <div class="pre-corner tl"></div>
      <div class="pre-corner tr"></div>
      <div class="pre-corner bl"></div>
      <div class="pre-corner br"></div>
    </div>
  </div>

  <!-- Title -->
  <div class="pre-title">ILYA</div>
  <div class="pre-sub">AI · PLATFORM · V2</div>

  <!-- Lightning Progress Bar -->
  <div class="lightning-wrap">
    <div class="lightning-track">
      <div class="lightning-fill" id="lightning-fill">
        <span class="lightning-bolt" id="lightning-bolt">⚡</span>
      </div>
    </div>
    <div class="pre-loading-text" id="pre-loading-text">
      جاري تهيئة المنصة...
    </div>
  </div>
</div>

<!-- ══ Main App ══════════════════════════════════════════════ -->
<div id="app" style="display:none">

  <!-- ── Sidebar Overlay ────────────────────────────────── -->
  <div id="sidebar-overlay">
    <div id="sidebar"></div>
  </div>

  <!-- ── Bottom Navigation ──────────────────────────────── -->
  <nav id="main-nav" class="hidden">
    <div class="nav-item active" data-nav="home">
      <span class="nav-icon">🏠</span>
      <span class="nav-label" data-i18n-home>الرئيسية</span>
    </div>
    <div class="nav-item" data-nav="ai">
      <span class="nav-icon">🎨</span>
      <span class="nav-label" data-i18n-ai>خدمات AI</span>
    </div>
    <div class="nav-item" data-nav="profile">
      <span class="nav-icon">👤</span>
      <span class="nav-label" data-i18n-profile>حسابي</span>
    </div>
    <div class="nav-item" data-nav="sidebar">
      <div class="hamburger-btn" id="hamburger">
        <span></span><span></span><span></span>
      </div>
      <span class="nav-label" data-i18n-menu>القائمة</span>
    </div>
  </nav>

  <!-- ──────────────────────────────────────────────────── -->
  <!-- PAGE: AUTH                                           -->
  <!-- ──────────────────────────────────────────────────── -->
  <div id="page-auth" class="page hidden"></div>

  <!-- ──────────────────────────────────────────────────── -->
  <!-- PAGE: DASHBOARD                                      -->
  <!-- ──────────────────────────────────────────────────── -->
  <div id="page-dashboard" class="page hidden"></div>

  <!-- ──────────────────────────────────────────────────── -->
  <!-- PAGE: AI SERVICES LIST                               -->
  <!-- ──────────────────────────────────────────────────── -->
  <div id="page-ai" class="page hidden"></div>

  <!-- ──────────────────────────────────────────────────── -->
  <!-- PAGE: AI MODEL INTERFACE                             -->
  <!-- ──────────────────────────────────────────────────── -->
  <div id="page-model" class="page hidden"></div>

  <!-- ──────────────────────────────────────────────────── -->
  <!-- PAGE: PROFILE                                        -->
  <!-- ──────────────────────────────────────────────────── -->
  <div id="page-profile" class="page hidden"></div>

  <!-- ──────────────────────────────────────────────────── -->
  <!-- PAGE: HELP                                           -->
  <!-- ──────────────────────────────────────────────────── -->
  <div id="page-help" class="page hidden"></div>

  <!-- ──────────────────────────────────────────────────── -->
  <!-- PAGE: SUPPORT                                        -->
  <!-- ──────────────────────────────────────────────────── -->
  <div id="page-support" class="page hidden"></div>

  <!-- ──────────────────────────────────────────────────── -->
  <!-- PAGE: ADMIN PANEL                                    -->
  <!-- ──────────────────────────────────────────────────── -->
  <div id="page-admin" class="page hidden"></div>

</div><!-- /#app -->

<!-- ══ Scripts (order matters) ═══════════════════════════════ -->
<script src="background.js"></script>
<script src="app.js"></script>
<script src="auth.js"></script>
<script src="dashboard.js"></script>
<script src="ai.js"></script>
<script src="admin.js"></script>

</body>
</html>
