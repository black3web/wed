<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#050000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="ILYA AI — منصة خدمات الذكاء الاصطناعي المتكاملة">
  <title>ILYA AI Platform</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══ Animated BG ═══════════════════════════════════════════ -->
<canvas id="bg-canvas"></canvas>

<!-- ═══ PRELOADER ═════════════════════════════════════════════ -->
<div id="preloader">
  <div class="pre-nebula"></div>
  <div class="pre-particles" id="pre-particles"></div>

  <div class="pre-frame">
    <div class="pre-ring r1"></div>
    <div class="pre-ring r2"></div>
    <div class="pre-ring r3"></div>
    <svg class="pre-hex" viewBox="0 0 200 200" fill="none">
      <polygon points="100,6 190,53 190,147 100,194 10,147 10,53"
               stroke="rgba(220,20,60,0.45)" stroke-width="1.2" fill="none"/>
      <polygon points="100,22 176,66 176,134 100,178 24,134 24,66"
               stroke="rgba(220,20,60,0.2)"  stroke-width="0.6" fill="none"/>
    </svg>
    <img src="https://iili.io/B04MxcX.md.jpg" id="pre-logo" class="pre-logo" alt="ILYA"
         onerror="this.style.background='linear-gradient(135deg,#3d0000,#8B0000)'">
    <div class="pre-scan-wrap"><div class="pre-scan"></div></div>
    <div class="pre-corner pc-tl"></div>
    <div class="pre-corner pc-tr"></div>
    <div class="pre-corner pc-bl"></div>
    <div class="pre-corner pc-br"></div>
  </div>

  <div class="pre-title-wrap">
    <h1 class="pre-title">ILYA</h1>
    <p class="pre-sub">AI · PLATFORM · v3</p>
  </div>

  <div class="pre-bar-wrap">
    <div class="pre-track">
      <div class="pre-fill" id="pre-fill"></div>
      <div class="pre-bolt" id="pre-bolt"><i class="fa-solid fa-bolt"></i></div>
    </div>
    <div class="pre-meta">
      <span id="pre-status">تهيئة المنصة...</span>
      <span class="pre-pct" id="pre-pct">0%</span>
    </div>
  </div>
</div>

<!-- ═══ APP ═══════════════════════════════════════════════════ -->
<div id="app">

  <!-- Toast -->
  <div id="toast-container"></div>

  <!-- Lightbox -->
  <div id="lightbox">
    <div class="lb-backdrop"></div>
    <div class="lb-content">
      <button class="lb-close" id="lb-close"><i class="fa-solid fa-xmark"></i></button>
      <img src="" alt="" id="lb-img">
    </div>
  </div>

  <!-- Sidebar Overlay -->
  <div id="sidebar-overlay">
    <aside id="sidebar"></aside>
  </div>

  <!-- Top Bar (hidden on auth) -->
  <header id="top-bar" class="hidden">
    <button class="top-hamburger" id="hamburger-btn" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>

    <div class="top-logo">
      <span class="logo-orb"></span>
      <span class="logo-text">ILYA <em>AI</em></span>
    </div>

    <div class="top-actions">
      <button class="top-lang-btn" id="lang-btn" aria-label="Language">
        <i class="fa-solid fa-globe"></i>
        <span id="lang-label">EN</span>
      </button>
      <button class="top-avatar-btn" id="top-avatar-btn" aria-label="Profile">
        <img src="https://iili.io/B04MxcX.md.jpg" id="top-avatar-img" alt="Avatar"
             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22/>'">
      </button>
    </div>
  </header>

  <!-- Pages -->
  <div id="page-auth"      class="page"></div>
  <div id="page-dashboard" class="page"></div>
  <div id="page-ai"        class="page"></div>
  <div id="page-model"     class="page"></div>
  <div id="page-profile"   class="page"></div>
  <div id="page-help"      class="page"></div>
  <div id="page-support"   class="page"></div>
  <div id="page-gallery"   class="page"></div>
  <div id="page-admin"     class="page"></div>

</div><!-- /#app -->

<!-- Scripts (order matters) -->
<script src="background.js"></script>
<script src="app.js"></script>
<script src="auth.js"></script>
<script src="dashboard.js"></script>
<script src="ai.js"></script>
<script src="admin.js"></script>

</body>
</html>
